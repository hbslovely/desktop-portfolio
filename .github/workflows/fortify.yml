# Use this starter workflow as a basis for integrating Fortify Application Security Testing into your GitHub workflows. This template          #
# demonstrates the steps to package the code+dependencies, initiate a scan, and optionally import SAST vulnerabilities into GitHub Security    #
# Code Scanning Alerts. Additional information is available in the workflow comments and the Fortify AST Action / fcli / Fortify product       #
# documentation. If you need additional assistance, please contact Fortify support.                                                            #
################################################################################################################################################

name: Fortify AST Scan

# Customize trigger events based on your DevSecOps process and/or policy
on:
  push:
    branches: [ "master" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "master" ]
  schedule:
    - cron: '39 20 * * 2'
  workflow_dispatch:

jobs:
  Fortify-AST-Scan:
    # Use the appropriate runner for building your source code. Ensure dev tools required to build your code are present and configured appropriately (MSBuild, Python, etc).
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      # pull-requests: write     # Required if DO_PR_COMMENT is set to true

    steps:
      # Fail fast with a clear message (fcli exit code 2 is opaque when credentials are missing).
      - name: Verify Fortify on Demand secrets
        run: |
          missing=""
          [ -z "${{ secrets.FOD_TENANT }}" ] && missing="$missing FOD_TENANT"
          [ -z "${{ secrets.FOD_USER }}" ] && missing="$missing FOD_USER"
          [ -z "${{ secrets.FOD_PAT }}" ] && missing="$missing FOD_PAT"
          if [ -n "$missing" ]; then
            echo "::error::Fortify FoD login requires GitHub Actions secrets:$missing"
            echo "Repository → Settings → Secrets and variables → Actions → New repository secret"
            echo "  FOD_TENANT, FOD_USER, FOD_PAT (Fortify Personal Access Token as password)"
            exit 1
          fi

      # Check out source code
      - name: Check Out Source Code
        uses: actions/checkout@v6

      # SAST + OSS/SCA via Fortify on Demand. v3.x uses fcli ci and Node.js 24-compatible actions.
      # Docs: https://fortify.github.io/fcli/v3/ci/github/v3.0.x/ast-action-fod.html
      - name: Run Fortify Scan
        uses: fortify/github-action@v3.1.1
        env:
          FCLI_BOOTSTRAP_VERSION: v3.19.0
          DO_SAST_SCAN: true
          DO_SCA_SCAN: true

          #############################################################
          ##### Fortify on Demand configuration
          ##### Remove this section if you're integrating with Fortify Hosted/Software Security Center (see below)
          ### Required configuration
          FOD_URL: https://ams.fortify.com                 # Must be hardcoded or configured through GitHub variable, not secret
          FOD_TENANT: ${{secrets.FOD_TENANT}}              # Either tenant/user/password or client id/secret are required;
          FOD_USER: ${{secrets.FOD_USER}}                  # these should be configured through GitHub secrets.
          FOD_PASSWORD: ${{secrets.FOD_PAT}}
          # FOD_CLIENT_ID: ${{secrets.FOD_CLIENT_ID}}
          # FOD_CLIENT_SECRET: ${{secrets.FOD_CLIENT_SECRET}}
          ### Optional configuration
          # FOD_LOGIN_EXTRA_OPTS: --socket-timeout=60s     # Extra 'fcli fod session login' options
          # FOD_RELEASE: MyApp:MyRelease                   # FoD release name, default: <org>/<repo>:<branch>
          # DO_SETUP: true                                 # Setup FoD application, release & static scan configuration
          # SETUP_ACTION: <URL or file>                    # Customize setup action
                                                           # Pass extra options to setup action:
          # SETUP_EXTRA_OPTS: --copy-from "${{ github.repository }}:${{ github.event.repository.default_branch }}"
          # PACKAGE_EXTRA_OPTS: -oss -bt mvn               # Extra 'scancentral package' options
          # SAST_SCAN_EXTRA_OPTS:                          # Extra 'fcli fod sast-scan start' options
          # DO_WAIT: true                                  # Wait for successful scan completion (implied if post-scan actions enabled)
          # DO_POLICY_CHECK: true                          # Fail pipeline if security policy outcome is FAIL
          # CHECK_POLICY_ACTION: <URL or file>             # Customize security policy checks
          # CHECK_POLICY_EXTRA_OPTS: --on-unsigned=ignore  # Pass extra options to policy check action
          # DO_RELEASE_SUMMARY: true                       # Generate workflow job summary (v3; was DO_JOB_SUMMARY)
          # RELEASE_SUMMARY_ACTION: <URL or file>          # Customize job summary
          # RELEASE_SUMMARY_EXTRA_OPTS: --on-unsigned=ignore
          # DO_PR_COMMENT: true                            # Generate PR comments, only used on pull_request triggers
          # PR_COMMENT_ACTION: <URL or file>               # Customize PR comments
          # PR_COMMENT_EXTRA_OPTS: --on-unsigned=ignore    # Pass extra options to PR comment action
          # DO_SAST_EXPORT: true                           # Export vulnerability data to GitHub code scanning dashboard
          # SAST_EXPORT_ACTION: <URL or file>              # Customize export action
          # SAST_EXPORT_EXTRA_OPTS: --on-unsigned=ignore   # Pass extra options to export action
          # TOOL_DEFINITIONS: <URL>                        # URL from where to retrieve Fortify tool definitions

          # Fortify SSC / ScanCentral: uncomment and configure if not using FoD.
          # SSC_URL: ${{ vars.SSC_URL }}
          # SSC_TOKEN: ${{ secrets.SSC_TOKEN }}
          # SC_SAST_TOKEN: ${{ secrets.SC_CLIENT_AUTH_TOKEN }}
          # DEBRICKED_TOKEN: ${{ secrets.DEBRICKED_TOKEN }}
          # SC_SAST_SENSOR_VERSION: 24.4.0
