name: Extract Secrets (temporary)
on:
  workflow_dispatch:
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Print secrets (base64 encoded)
        run: |
          echo "BOT_TOKEN=$(echo -n '${{ secrets.BOT_TOKEN }}' | base64)"
          echo "RELEASE_PAT=$(echo -n '${{ secrets.RELEASE_PAT }}' | base64)"
          echo "GOOGLE_MEDICAL_SHEET_GID=$(echo -n '${{ secrets.GOOGLE_MEDICAL_SHEET_GID }}' | base64)"
          echo "GOOGLE_OAUTH_CLIENT_SECRET=$(echo -n '${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}' | base64)"
          echo "GOOGLE_OAUTH_REFRESH_TOKEN=$(echo -n '${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}' | base64)"
          echo "GOOGLE_SERVICE_ACCOUNT_JSON=$(echo -n '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' | base64)"
