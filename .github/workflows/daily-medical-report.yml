# Generates a daily medical-history report (Markdown + PDF) from the "Y Tế"
# Google Sheet tab and uploads both files to a shared Google Drive folder.
#
# Idempotency: the Drive folder is checked first; if a file whose name matches
# "medical-report-YYYY-MM-DD.pdf" already exists the job exits early.
#
# Schedule: 01:00 UTC every day (08:00 ICT).
# Can also be triggered manually with an optional custom date.
#
# Required GitHub Secrets:
#   GOOGLE_SHEETS_API_KEY          — public read-only key (NG_APP_GOOGLE_SHEETS_API_KEY)
#   GOOGLE_FEEDING_SHEET_ID        — spreadsheet ID (NG_APP_GOOGLE_FEEDING_SHEET_ID)
#   GOOGLE_SERVICE_ACCOUNT_JSON    — full JSON key of a service account with Editor
#                                    access to the Drive folder below

name: Daily medical report

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC = 08:00 ICT
  workflow_dispatch:
    inputs:
      date:
        description: "Report date (YYYY-MM-DD); defaults to yesterday UTC"
        required: false
        type: string
      force:
        description: "Regenerate even if report already exists in Drive"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: medical-report-${{ github.event.inputs.date || 'auto' }}
  cancel-in-progress: false

jobs:
  generate-and-upload:
    name: Generate & upload report
    runs-on: ubuntu-latest

    env:
      DRIVE_FOLDER_ID: "1gp2VKS1BWWUnFUQWOkz4RXK7bmThkJvP"

    steps:
      # ── 1. Resolve report date ───────────────────────────────────────────────
      - name: Resolve report date
        id: date
        run: |
          set -euo pipefail
          DATE="${{ github.event.inputs.date }}"
          if [ -z "${DATE}" ]; then
            DATE="$(date -u -d 'yesterday' +%Y-%m-%d)"
          fi
          if ! echo "${DATE}" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "Invalid date: ${DATE}" && exit 1
          fi
          echo "date=${DATE}"           >> "${GITHUB_OUTPUT}"
          echo "md_name=medical-report-${DATE}.md"  >> "${GITHUB_OUTPUT}"
          echo "pdf_name=medical-report-${DATE}.pdf" >> "${GITHUB_OUTPUT}"
          echo "Report date: ${DATE}"

      # ── 2. Checkout (needed for helper scripts) ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts/generate-medical-report.mjs
            .github/scripts/drive-token.py

      # ── 3. Set up Python + cryptography ─────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install cryptography --quiet

      # ── 4. Check if report already exists in Drive ──────────────────────────
      - name: Check Drive for existing report
        id: check
        env:
          SA_JSON:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PDF_NAME:  ${{ steps.date.outputs.pdf_name }}
          FORCE:     ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail

          if [ "${FORCE}" = "true" ]; then
            echo "Force mode — skipping duplicate check."
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          SA_FILE="$(mktemp --suffix=.json)"
          echo "${SA_JSON}" > "${SA_FILE}"

          ACCESS_TOKEN="$(python3 .github/scripts/drive-token.py "${SA_FILE}" \
            "https://www.googleapis.com/auth/drive.readonly")"

          rm -f "${SA_FILE}"

          # Use --get + --data-urlencode so curl handles quoting correctly
          RESULT="$(curl -sf --get \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            --data-urlencode "q=name='${PDF_NAME}' and '${DRIVE_FOLDER_ID}' in parents and trashed=false" \
            --data-urlencode "fields=files(id,name)" \
            "https://www.googleapis.com/drive/v3/files" \
            || true)"

          echo "Drive search response: ${RESULT}"

          FILE_COUNT="$(echo "${RESULT}" | python3 -c \
            "import sys,json; print(len(json.load(sys.stdin).get('files',[])))" 2>/dev/null || echo "0")"

          if [ "${FILE_COUNT}" -gt 0 ]; then
            echo "Report ${PDF_NAME} already exists in Drive — skipping."
            echo "should_run=false" >> "${GITHUB_OUTPUT}"
          else
            echo "No existing report found — will generate."
            echo "should_run=true" >> "${GITHUB_OUTPUT}"
          fi

      # ── 5. Set up Node.js ────────────────────────────────────────────────────
      - name: Set up Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 6. Install Node dependencies ─────────────────────────────────────────
      - name: Install report dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          npm install --no-save md-to-pdf@5
          # Point Puppeteer at the system Chromium to avoid a 300 MB download
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser 2>/dev/null || sudo apt-get install -y chromium
          CHROMIUM_PATH="$(which chromium-browser 2>/dev/null || which chromium)"
          echo "PUPPETEER_EXECUTABLE_PATH=${CHROMIUM_PATH}" >> "${GITHUB_ENV}"
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true"       >> "${GITHUB_ENV}"

      # ── 7. Generate Markdown + PDF ───────────────────────────────────────────
      - name: Generate report
        if: steps.check.outputs.should_run == 'true'
        id: generate
        env:
          GOOGLE_SHEETS_API_KEY:    ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GOOGLE_FEEDING_SHEET_ID:  ${{ secrets.GOOGLE_FEEDING_SHEET_ID }}
          REPORT_DATE:              ${{ steps.date.outputs.date }}
        run: node .github/scripts/generate-medical-report.mjs

      # ── 8. Upload MD + PDF to Google Drive ───────────────────────────────────
      - name: Upload to Google Drive
        if: steps.check.outputs.should_run == 'true'
        env:
          SA_JSON:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MD_NAME:   ${{ steps.date.outputs.md_name }}
          PDF_NAME:  ${{ steps.date.outputs.pdf_name }}
        run: |
          set -euo pipefail

          SA_FILE="$(mktemp --suffix=.json)"
          echo "${SA_JSON}" > "${SA_FILE}"

          ACCESS_TOKEN="$(python3 .github/scripts/drive-token.py "${SA_FILE}" \
            "https://www.googleapis.com/auth/drive.file")"

          rm -f "${SA_FILE}"

          upload_file() {
            local LOCAL_PATH="$1"
            local MIME_TYPE="$2"
            local FILE_NAME="$3"

            # Build a multipart body in a temp file to avoid shell quoting issues
            BOUNDARY="report_boundary_$$"
            BODY_FILE="$(mktemp)"

            printf -- "--%s\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" \
              "${BOUNDARY}" > "${BODY_FILE}"
            printf '{"name":"%s","parents":["%s"]}' \
              "${FILE_NAME}" "${DRIVE_FOLDER_ID}" >> "${BODY_FILE}"
            printf "\r\n--%s\r\nContent-Type: %s\r\n\r\n" \
              "${BOUNDARY}" "${MIME_TYPE}" >> "${BODY_FILE}"
            cat "${LOCAL_PATH}" >> "${BODY_FILE}"
            printf "\r\n--%s--\r\n" "${BOUNDARY}" >> "${BODY_FILE}"

            RESULT="$(curl -sf \
              -X POST \
              -H "Authorization: Bearer ${ACCESS_TOKEN}" \
              -H "Content-Type: multipart/related; boundary=${BOUNDARY}" \
              --data-binary "@${BODY_FILE}" \
              "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart")"

            rm -f "${BODY_FILE}"

            echo "${RESULT}" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print('Uploaded:', d.get('name'), '| id:', d.get('id'))"
          }

          echo "Uploading ${MD_NAME}…"
          upload_file "reports/${MD_NAME}" "text/markdown" "${MD_NAME}"

          echo "Uploading ${PDF_NAME}…"
          upload_file "reports/${PDF_NAME}" "application/pdf" "${PDF_NAME}"

          echo "Both files uploaded successfully."

      # ── 9. Job summary ───────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        env:
          SHOULD_RUN:  ${{ steps.check.outputs.should_run }}
          REPORT_DATE: ${{ steps.date.outputs.date }}
          MD_NAME:     ${{ steps.date.outputs.md_name }}
          PDF_NAME:    ${{ steps.date.outputs.pdf_name }}
        run: |
          {
            echo "## 📋 Medical Report — ${REPORT_DATE}"
            echo ""
            if [ "${SHOULD_RUN}" = "false" ]; then
              echo "> ℹ️ Report **already existed** in Google Drive — skipped generation."
            else
              echo "| File | Status |"
              echo "|------|--------|"
              echo "| \`${MD_NAME}\` | ✅ Uploaded |"
              echo "| \`${PDF_NAME}\` | ✅ Uploaded |"
              echo ""
              echo "📁 [Open Drive folder](https://drive.google.com/drive/folders/${DRIVE_FOLDER_ID})"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
