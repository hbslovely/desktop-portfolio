name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'
      - 'src/app/app-info.ts'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'
      - 'src/app/app-info.ts'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, format & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Production build
        run: npm run build
