# 1st of each month (UTC): commit package.json YYYY.MM, then tag vYYYY.MM.

name: Monthly release

on:
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Create release even if no new commits since last monthly tag"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  release:
    name: Monthly release if changed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Check changes and prepare release
        id: prep
        run: |
          set -euo pipefail

          PACKAGE_VERSION="$(node .github/scripts/release-version.mjs monthly)"
          RELEASE_TAG="v${PACKAGE_VERSION}"

          echo "monthly_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"

          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_TAG} already exists."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          PREV_TAG="$(node .github/scripts/release-version.mjs previous-monthly-tag)"

          if git rev-parse "refs/tags/${PREV_TAG}" >/dev/null 2>&1; then
            COMMIT_COUNT="$(git rev-list --count \
              --grep='^chore(release):' --extended-regexp --invert-grep \
              "${PREV_TAG}..HEAD")"
            echo "previous_tag=${PREV_TAG}" >> "${GITHUB_OUTPUT}"
          else
            COMMIT_COUNT="$(git rev-list --count \
              --grep='^chore(release):' --extended-regexp --invert-grep \
              HEAD)"
            echo "previous_tag=" >> "${GITHUB_OUTPUT}"
          fi

          echo "commit_count=${COMMIT_COUNT}" >> "${GITHUB_OUTPUT}"

          FORCE="${{ github.event.inputs.force || 'false' }}"
          if [ "${COMMIT_COUNT}" -eq 0 ] && [ "${FORCE}" != "true" ]; then
            echo "No non-release commits since last monthly release — skipping."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "should_release=true" >> "${GITHUB_OUTPUT}"

          {
            echo "## Monthly release ${RELEASE_TAG}"
            echo ""
            echo "**package.json version:** \`${PACKAGE_VERSION}\`"
            echo ""
            if git rev-parse "refs/tags/${PREV_TAG}" >/dev/null 2>&1; then
              echo "Changes since \`${PREV_TAG}\` (${COMMIT_COUNT} commits):"
            else
              echo "Initial monthly release (${COMMIT_COUNT} commits):"
            fi
            echo ""
            if git rev-parse "refs/tags/${PREV_TAG}" >/dev/null 2>&1; then
              git log --pretty=format:'- %s (`%h`)' \
                --grep='^chore(release):' --extended-regexp --invert-grep \
                "${PREV_TAG}..HEAD" || true
            else
              git log --pretty=format:'- %s (`%h`)' \
                --grep='^chore(release):' --extended-regexp --invert-grep \
                -n 50 HEAD || true
            fi
          } > release-notes.md

      - name: Commit package.json version
        if: steps.prep.outputs.should_release == 'true'
        run: |
          .github/scripts/commit-package-version.sh \
            "${{ steps.prep.outputs.package_version }}" \
            "chore(release): monthly release v${{ steps.prep.outputs.package_version }}" \
            "${{ github.event.repository.default_branch }}"

      - name: Push monthly tag
        if: steps.prep.outputs.should_release == 'true'
        run: |
          .github/scripts/push-release-tag.sh \
            "${{ steps.prep.outputs.monthly_tag }}" \
            "${{ steps.prep.outputs.package_version }}" \
            "Monthly release ${{ steps.prep.outputs.monthly_tag }}"

      - name: Create GitHub Release
        if: steps.prep.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.monthly_tag }}
          name: Release ${{ steps.prep.outputs.monthly_tag }}
          body_path: release-notes.md
          generate_release_notes: false
          draft: false
          prerelease: false
