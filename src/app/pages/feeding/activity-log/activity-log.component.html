<!-- Activity Log Icon Button -->
<button
  type="button"
  class="activity-log-btn"
  [class.has-unread]="unreadCount() > 0"
  (click)="openDialog()"
  title="Lịch sử hoạt động"
>
  <i class="pi pi-bell"></i>
  <span class="activity-badge" *ngIf="unreadCount() > 0">
    {{ unreadCount() > 9 ? '9+' : unreadCount() }}
  </span>
</button>

<!-- Dialog Overlay -->
<div
  class="activity-dialog-overlay"
  *ngIf="dialogOpen()"
  (click)="closeDialog()"
  (touchmove)="$event.preventDefault()"
>
  <div
    class="activity-dialog"
    role="dialog"
    aria-modal="true"
    (click)="$event.stopPropagation()"
  >
    <header class="activity-dialog__header">
      <div class="activity-dialog__header-main">
        <div class="activity-dialog__title-mark" aria-hidden="true">
          <i class="pi pi-history"></i>
        </div>
        <h2 class="activity-dialog__heading">Lịch sử hoạt động</h2>
      </div>
      <button
        type="button"
        class="activity-dialog__close"
        (click)="closeDialog()"
        aria-label="Đóng"
      >
        <i class="pi pi-times"></i>
      </button>
    </header>

    <div class="activity-dialog__toolbar">
      <button
        type="button"
        class="activity-toolbar__reload"
        (click)="refreshLogs()"
        [disabled]="loading()"
        title="Làm mới"
        aria-label="Làm mới danh sách"
      >
        <i class="pi" [ngClass]="loading() ? 'pi-spin pi-spinner' : 'pi-refresh'"></i>
      </button>

      <label class="activity-toolbar__search">
        <i class="pi pi-search" aria-hidden="true"></i>
        <input
          type="search"
          name="activityLogSearch"
          autocomplete="off"
          placeholder="Tìm theo người, nội dung, loại…"
          [ngModel]="textSearchQuery()"
          (ngModelChange)="onTextSearchChange($event)"
        />
      </label>

      <div class="activity-toolbar__filters" role="group" aria-label="Lọc và sắp xếp">
        <label class="activity-field__control" aria-label="Danh mục">
          <i class="pi pi-filter" aria-hidden="true"></i>
          <select [(ngModel)]="filterCategory" (ngModelChange)="onFilterChange()">
            <option value="all">Tất cả</option>
            <option value="feeding">Cữ bú</option>
            <option value="weight">Cân nặng</option>
            <option value="medical">Y tế</option>
            <option value="schedule">Lịch hẹn</option>
            <option value="document">Tài liệu</option>
            <option value="settings">Cài đặt</option>
          </select>
        </label>
        <label class="activity-field__control" aria-label="Thứ tự">
          <i class="pi pi-sort-alt" aria-hidden="true"></i>
          <select [(ngModel)]="sortOrder" (ngModelChange)="onSortChange()">
            <option value="desc">Mới nhất</option>
            <option value="asc">Cũ nhất</option>
          </select>
        </label>
      </div>

      <span class="activity-count-pill" *ngIf="filteredLogs().length > 0">
        <span class="activity-count-pill__num">{{ displayedLogs().length }}</span>
        <span class="activity-count-pill__sep">/</span>
        <span class="activity-count-pill__total">{{ filteredLogs().length }}</span>
      </span>
    </div>

    <div class="activity-dialog__content" (touchmove)="$event.stopPropagation()">
      <div class="activity-loading" *ngIf="loading()">
        <i class="pi pi-spin pi-spinner"></i>
        <span>Đang tải...</span>
      </div>

      <div class="activity-empty" *ngIf="!loading() && filteredLogs().length === 0">
        <i class="pi pi-inbox"></i>
        <p *ngIf="hasTextFilter()">Không có mục nào khớp tìm kiếm.</p>
        <p *ngIf="!hasTextFilter() && filterCategory === 'all'">Chưa có hoạt động nào được ghi nhận</p>
        <p *ngIf="!hasTextFilter() && filterCategory !== 'all'">Không có hoạt động nào trong danh mục này</p>
      </div>

      <ul class="activity-list" *ngIf="!loading() && displayedLogs().length > 0">
        <li
          *ngFor="let row of parsedDisplayRows(); trackBy: trackByParsedRow"
          class="activity-item"
          [class.activity-item--unread]="isUnread(row.log.id)"
          [class.activity-item--delete]="isDeleteActivity(row.log.eventType)"
          [attr.data-color]="getEventColor(row.log.eventType)"
        >
          <div class="activity-item__rail" aria-hidden="true"></div>
          <div class="activity-item__icon">
            <i class="pi" [ngClass]="getEventIcon(row.log.eventType)"></i>
          </div>
          <div class="activity-item__body">
            <div class="activity-item__meta">
              <span class="activity-item__type">{{ getEventLabel(row.log.eventType) }}</span>
              <button
                type="button"
                class="activity-item__time activity-item__time-toggle"
                (click)="toggleActivityTimeDisplay($event)"
                [title]="activityTimeToggleTitle()"
                [attr.aria-label]="activityTimeToggleAriaLabel()"
              >
                {{ activityTimeText(row.log.timestamp) }}
              </button>
            </div>
            <p class="activity-item__content">
              <span class="activity-item__actor">
                <strong
                  class="activity-item__author"
                  [class.activity-item__author--system]="isSystemActor(row.log.user)"
                  >{{ displayActivityUser(row.log.user) }}</strong
                >
                <span class="activity-item__verb">đã</span>
              </span>
              <span class="activity-item__html" [innerHTML]="row.contentHtml"></span>
            </p>
          </div>
        </li>
      </ul>

      <div class="activity-load-more" *ngIf="hasMore()">
        <button type="button" class="load-more-btn" (click)="loadMore()">
          <i class="pi pi-angle-down"></i>
          Tải thêm ({{ remainingCount() }} còn lại)
        </button>
      </div>
    </div>
  </div>
</div>
