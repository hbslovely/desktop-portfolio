<div class="dialog-overlay" *ngIf="dialogOpen()" (click)="closeDialog()">
  <div
    class="dialog medical-dialog"
    role="dialog"
    aria-modal="true"
    (click)="$event.stopPropagation()"
  >
    <div class="dialog-head">
      <div>
        <h2>
          <i class="pi pi-pencil"></i>
          {{ editingEntry() ? 'Sửa sự kiện' : 'Thêm sự kiện' }}
        </h2>
      </div>
      <button type="button" class="dialog-close" (click)="closeDialog()" aria-label="Đóng">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="alert error" *ngIf="errorMsg()">
      <i class="pi pi-exclamation-circle"></i>
      {{ errorMsg() }}
    </div>

    <form class="medical-form" (ngSubmit)="submitDialog()">
      <label class="field">
        <span class="label">Ngày</span>
        <input
          type="date"
          [ngModel]="draft().date"
          (ngModelChange)="updateDraft({ date: $event })"
          name="mhDate"
          [max]="maxDateToday"
          required
        />
      </label>

      <div class="field mh-combo-field">
        <span class="label">Loại</span>
        <div class="mh-combo" [class.open]="kindPickerOpen()">
          <button
            type="button"
            class="mh-combo-trigger"
            (click)="toggleKindPicker(); $event.stopPropagation()"
          >
            <span class="mh-combo-trigger__icon"><i [class]="metaFor(draft().kind).icon"></i></span>
            <span class="mh-combo-trigger__text">{{ metaFor(draft().kind).label }}</span>
            <i class="pi pi-chevron-down mh-combo-chev"></i>
          </button>
          <div class="mh-combo-panel" *ngIf="kindPickerOpen()" (click)="$event.stopPropagation()">
            <input
              type="search"
              class="mh-combo-search"
              placeholder="Tìm loại…"
              [ngModel]="kindSearch()"
              (ngModelChange)="kindSearch.set($event)"
              name="mhKindSearch"
              autocomplete="off"
              (click)="$event.stopPropagation()"
            />
            <ul class="mh-combo-list" role="listbox">
              <li
                *ngFor="let km of filteredKindCatalog()"
                role="option"
                [class.active]="draft().kind === km.id"
                (click)="selectKind(km.id)"
              >
                <i [class]="km.icon"></i> {{ km.label }}
              </li>
            </ul>
          </div>
        </div>
      </div>

      <label class="field">
        <span class="label">Tiêu đề</span>
        <input
          type="text"
          [ngModel]="draft().title"
          (ngModelChange)="updateDraft({ title: $event })"
          name="mhTitle"
          placeholder="VD: Mũi 2 Pentaxim — BV Nhi"
          required
        />
      </label>

      <label class="field">
        <span class="label">Chi tiết</span>
        <textarea
          [ngModel]="draft().detail"
          (ngModelChange)="updateDraft({ detail: $event })"
          name="mhDetail"
          rows="3"
          placeholder="Phản ứng, chỉ định BS, liều…"
        ></textarea>
      </label>

      <div class="field mh-combo-field">
        <span class="label">Nơi khám</span>
        <div class="mh-combo mh-place-combo" [class.open]="placePickerOpen()">
          <input
            type="text"
            class="mh-combo-input"
            [ngModel]="draft().place"
            (ngModelChange)="
              updateDraft({ place: $event }); kindPickerOpen.set(false); placePickerOpen.set(true)
            "
            (focus)="onPlaceFieldFocus()"
            name="mhPlace"
            placeholder="Chọn hoặc gõ tên cơ sở…"
            autocomplete="off"
          />
          <div class="mh-combo-panel" *ngIf="placePickerOpen()" (click)="$event.stopPropagation()">
            <button
              type="button"
              class="mh-combo-add"
              *ngIf="canAddCustomPlace()"
              (click)="addCustomPlaceFromDraft()"
            >
              <i class="pi pi-plus"></i> Thêm «{{ draft().place.trim() }}» vào danh sách
            </button>
            <ul class="mh-combo-list mh-combo-list--places">
              <li *ngFor="let p of filteredPlaceSuggestions()" (click)="selectPlace(p)">
                {{ p }}
              </li>
            </ul>
          </div>
        </div>
      </div>

      <div class="field med-attach-field">
        <span class="label">Ảnh đính kèm</span>
        <div
          class="med-preview med-preview--saved"
          *ngIf="
            editingEntry() &&
            !pendingAttachmentPreviewUrl() &&
            !stripExistingAttachment() &&
            attachmentFor(editingEntry()!) as sav
          "
        >
          <img
            *ngIf="sav.content || sav.previewUrl"
            [src]="sav.previewUrl || sav.content"
            alt="Đính kèm hiện tại"
          />
          <button type="button" class="btn ghost sm" (click)="removeSavedAttachment()">
            <i class="pi pi-times"></i> Gỡ ảnh đã lưu
          </button>
        </div>
        <div class="med-preview med-preview--new" *ngIf="pendingAttachmentPreviewUrl() as prevUrl">
          <img [src]="prevUrl" alt="Xem trước" />
          <button type="button" class="btn ghost sm" (click)="clearPendingAttachment()">
            Huỷ ảnh mới
          </button>
        </div>
        <label class="med-upload-card">
          <input
            type="file"
            accept="image/*,.heic,.heif"
            class="sr-only"
            (change)="onAttachmentInput($any($event.target))"
          />
          <span class="med-upload-card__icon" aria-hidden="true">
            <i class="pi pi-images"></i>
          </span>
          <span class="med-upload-card__text">
            <strong class="med-upload-card__title">{{
              pendingAttachment() ? 'Đổi ảnh' : 'Chọn ảnh'
            }}</strong>
          </span>
          <span class="med-upload-card__arrow" aria-hidden="true">
            <i class="pi pi-angle-right"></i>
          </span>
        </label>
      </div>

      <div class="dialog-actions">
        <button type="button" class="btn ghost" (click)="closeDialog()" [disabled]="saving()">
          Huỷ
        </button>
        <button type="submit" class="btn primary" [disabled]="saving()">
          <i class="pi pi-check" *ngIf="!saving()"></i>
          <i class="pi pi-spin pi-spinner" *ngIf="saving()"></i>
          {{ editingEntry() ? 'Cập nhật' : 'Lưu' }}
        </button>
      </div>
    </form>
  </div>
</div>
