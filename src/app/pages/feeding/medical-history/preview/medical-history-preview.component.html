@if (preview(); as pv) {
  <div
    class="mh-preview"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'Xem ảnh: ' + pv.title"
  >
    <button
      type="button"
      class="mh-preview__close"
      (click)="close(); $event.stopPropagation()"
      aria-label="Đóng (Esc)"
      title="Đóng (Esc)"
    >
      <i class="pi pi-times"></i>
    </button>
    <div class="mh-preview__name">{{ pv.title }}</div>
    <div
      class="mh-preview__stage"
      [class.zoomed]="scale() > 1.001"
      [class.interacting]="interacting()"
      (wheel)="onWheel($event)"
      (pointerdown)="onPointerDown($event)"
      (pointermove)="onPointerMove($event)"
      (pointerup)="onPointerUp($event)"
      (pointercancel)="onPointerUp($event)"
      (pointerleave)="onPointerUp($event)"
      (dblclick)="onDblClick($event)"
    >
      <img
        class="mh-preview__img"
        [src]="pv.src"
        [alt]="pv.title"
        [style.transform]="transform()"
        draggable="false"
        (dragstart)="$event.preventDefault()"
      />
    </div>
    <div class="mh-preview__zoom" (click)="$event.stopPropagation()">
      <button
        type="button"
        class="mh-zoom-btn"
        (click)="zoomOut($event)"
        [disabled]="!canZoomOut()"
        title="Thu nhỏ (-)"
        aria-label="Thu nhỏ"
      >
        <i class="pi pi-minus"></i>
      </button>
      <button
        type="button"
        class="mh-zoom-btn percent"
        (click)="resetZoom(); $event.stopPropagation()"
        title="Đặt lại 100% (0)"
        aria-label="Đặt lại zoom"
      >
        {{ zoomPercent() }}%
      </button>
      <button
        type="button"
        class="mh-zoom-btn"
        (click)="zoomIn($event)"
        [disabled]="!canZoomIn()"
        title="Phóng to (+)"
        aria-label="Phóng to"
      >
        <i class="pi pi-plus"></i>
      </button>
    </div>
    @if (scale() <= 1.001) {
      <p class="mh-preview__hint">
        Cuộn hoặc bấm <i class="pi pi-plus"></i> để phóng to · Nháy đôi để zoom · Esc đóng
      </p>
    }
    @if (pv.driveFileId) {
      <button
        type="button"
        class="mh-preview__docs"
        (click)="onOpenInDocuments(pv.driveFileId)"
      >
        <i class="pi pi-folder-open"></i> Mở trong tab mới
      </button>
    }
  </div>
}
