<div class="fb-scanner">
  <!-- Animated Background -->
  <div class="bg-effects">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>

  <!-- Main Content -->
  <div class="scanner-content">
    <!-- Header -->
    <header class="scanner-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>FB Scanner</h1>
          <span>Phone to Facebook ID</span>
        </div>
      </div>
    </header>

    <!-- Search Card -->
    <div class="search-card glass">
      <div class="search-input-group">
        <div class="input-container">
          <span class="input-prefix">+84</span>
          <input
            #phoneInput
            type="tel"
            inputmode="numeric"
            [(ngModel)]="phone"
            (keydown)="onPhoneKeyDown($event)"
            placeholder="Enter phone number"
            [disabled]="loading()">
          <button
            *ngIf="phone()"
            (click)="clearPhone()"
            class="clear-btn"
            type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <button
          (click)="searchFbId()"
          class="search-btn"
          [class.loading]="loading()"
          [disabled]="loading() || !phone().trim()">
          <span class="btn-content">
            <svg *ngIf="!loading()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <span class="spinner" *ngIf="loading()"></span>
            <span class="btn-text">{{ loading() ? 'Scanning...' : 'Scan' }}</span>
          </span>
        </button>
      </div>

      <!-- Quick History -->
      <div class="quick-history" *ngIf="searchHistory().length > 0">
        <div class="history-chips">
          <button
            *ngFor="let phone of searchHistory().slice(0, 5)"
            (click)="useHistory(phone)"
            class="history-chip"
            type="button">
            {{ phone }}
          </button>
          <button (click)="clearHistory()" class="clear-all-btn" type="button" title="Clear history">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Error Message -->
    <div class="error-toast" *ngIf="error()" @fadeSlide>
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm-1-7v2h2v-2h-2zm0-8v6h2V7h-2z"/>
      </svg>
      <span>{{ error() }}</span>
    </div>

    <!-- Result Card -->
    <div class="result-card glass" *ngIf="facebookProfile()" @slideUp>
      <!-- Profile Section -->
      <div class="profile-section" *ngIf="facebookProfile()?.profileImage || facebookProfile()?.name">
        <div class="profile-avatar" *ngIf="facebookProfile()?.profileImage">
          <img [src]="facebookProfile()!.profileImage" [alt]="facebookProfile()!.name || 'Profile'" />
          <div class="avatar-ring"></div>
        </div>
        <div class="profile-info">
          <h3 *ngIf="facebookProfile()?.name">{{ facebookProfile()!.name }}</h3>
          <p class="profile-id">ID: {{ facebookProfile()!.id }}</p>
        </div>
      </div>

      <!-- ID Display -->
      <div class="id-display">
        <span class="label">Facebook ID</span>
        <span class="value">{{ result() }}</span>
      </div>

      <!-- Actions -->
      <div class="action-buttons">
        <button (click)="copyFacebookLink()" class="action-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          <span>Copy Link</span>
        </button>
        <button (click)="openFacebookLink()" class="action-btn primary" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
          </svg>
          <span>Open Profile</span>
        </button>
      </div>

      <!-- About -->
      <div class="about-section" *ngIf="facebookProfile()?.about">
        <p>{{ facebookProfile()!.about }}</p>
      </div>

      <!-- Loading Profile Overlay -->
      <div class="loading-overlay" *ngIf="loadingProfile()">
        <span class="spinner"></span>
        <span>Fetching profile...</span>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="!loading() && !result() && !error()">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
          <path d="M11 8v6M8 11h6"/>
        </svg>
      </div>
      <p>Enter a phone number to find the associated Facebook account</p>
    </div>

    <!-- Loading State -->
    <div class="loading-state" *ngIf="loading() && !facebookProfile()">
      <div class="scan-animation">
        <div class="scan-ring"></div>
        <div class="scan-ring"></div>
        <div class="scan-ring"></div>
      </div>
      <p>Scanning database...</p>
    </div>
  </div>
</div>
