<div class="text-viewer-container">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="file-info">
      <i class="pi pi-file" [class.pi-file-edit]="isMarkdown()"></i>
      <span class="file-name">{{ fileName }}</span>
      @if (fileType) {
        <span class="file-type">.{{ fileType }}</span>
      }
    </div>

    <div class="toolbar-actions">
      <button class="action-btn" (click)="reload()" title="Reload">
        <i class="pi pi-refresh"></i>
      </button>
    </div>
  </div>

  <!-- Content Area -->
  <div class="content-area">
    <!-- Loading State -->
    @if (isLoading()) {
      <div class="loading-state">
        <i class="pi pi-spin pi-spinner"></i>
        <p>Loading {{ fileName }}...</p>
      </div>
    }

    <!-- Error State -->
    @if (hasError()) {
      <div class="error-state">
        <i class="pi pi-exclamation-triangle"></i>
        <h3>Failed to load file</h3>
        <p>{{ errorMessage() }}</p>
        <button class="retry-btn" (click)="reload()">
          <i class="pi pi-refresh"></i>
          Try Again
        </button>
      </div>
    }

    <!-- Content Display -->
    @if (!isLoading() && !hasError()) {
      <div class="content-display">
        <!-- Plain Text -->
        @if (!isMarkdown()) {
          <pre class="text-content">{{ content() }}</pre>
        }
        <!-- Markdown Content -->
        @if (isMarkdown()) {
          <div class="markdown-content" [innerHTML]="formattedContent()"></div>
        }
      </div>
    }
  </div>
</div>
