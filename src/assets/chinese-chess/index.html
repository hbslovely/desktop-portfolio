      [  1,   0,   2,   0,  15,   0,   2,   0,   1],  // Chốt đầu (e) bonus cao hơn
      [  2,   2,   4,   8,  18,   8,   4,   2,   2],  // Qua sông, chốt đầu vẫn quan trọng
      [  3,   6,   9,  12,  20,  12,   9,   6,   3],
      [  4,   8,  12,  16,  24,  16,  12,   8,   4],
      [ 10,  18,  22,  30,  40,  30,  22,  18,  10],
      [ 15,  25,  30,  42,  55,  42,  30,  25,  15],
      [ 20,  30,  40,  55,  70,  55,  40,  30,  20]   // Chốt đầu gần cung vua cực kỳ nguy hiểm
    ]
  };
  
  // === HỆ THỐNG PHÁT HIỆN VÀ ĐÁNH GIÁ MỐI ĐE DỌA ===
  
  // Tìm tất cả các quân đang bị đe dọa
  function findThreatenedPieces(color) {
    const threats = [];
    const enemyColor = (color === RED) ? BLACK : RED;
    
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        const p = board[r][c];
        if (p === 0 || getColor(p) !== color) continue;
        
        // Tìm các quân địch có thể ăn quân này
        const attackers = findAttackers(r, c, enemyColor);
        
        if (attackers.length > 0) {
          const pieceValue = getPieceValue(p, r, c, color);
          const defenders = findDefenders(r, c, color);
          
          threats.push({
            r, c,
            piece: p,
            type: getType(p),
            value: pieceValue,
            attackers: attackers,
            defenders: defenders,
            isHanging: defenders.length === 0,  // Quân "treo" không có ai bảo vệ
            netLoss: calculateExchangeValue(pieceValue, attackers, defenders)
          });
        }
      }
    }
    
    return threats;
  }
  
  // Tìm các quân đang tấn công một ô
  function findAttackers(r, c, attackerColor) {
    const attackers = [];
    
    for(let ar=0; ar<ROWS; ar++) {
      for(let ac=0; ac<COLS; ac++) {
        const p = board[ar][ac];
        if (p === 0 || getColor(p) !== attackerColor) continue;
        
        const moves = generateMoves(ar, ac, false);
        if (moves.some(m => m.r === r && m.c === c)) {
          attackers.push({
            r: ar, c: ac,
            piece: p,
            type: getType(p),
            value: getPieceValue(p, ar, ac, attackerColor)
          });
        }
      }
    }
    
    // Sắp xếp theo giá trị tăng dần (quân nhỏ tấn công trước)
    attackers.sort((a, b) => a.value - b.value);
    return attackers;
  }
  
  // Tìm các quân đang bảo vệ một ô
  function findDefenders(r, c, defenderColor) {
    const defenders = [];
    const originalPiece = board[r][c];
    
    // Tạm thời đặt quân địch giả ở đó để kiểm tra ai có thể "ăn lại"
    const enemyColor = (defenderColor === RED) ? BLACK : RED;
    board[r][c] = enemyColor | PIECE_PAWN; // Đặt quân giả
    
    for(let dr=0; dr<ROWS; dr++) {
      for(let dc=0; dc<COLS; dc++) {
        if (dr === r && dc === c) continue;
        const p = board[dr][dc];
        if (p === 0 || getColor(p) !== defenderColor) continue;
        
        const moves = generateMoves(dr, dc, false);
        if (moves.some(m => m.r === r && m.c === c)) {
          defenders.push({
            r: dr, c: dc,
            piece: p,
            type: getType(p),
            value: getPieceValue(p, dr, dc, defenderColor)
          });
        }
      }
    }
    
    board[r][c] = originalPiece; // Khôi phục
    
    // Sắp xếp theo giá trị tăng dần (quân nhỏ bảo vệ trước)
    defenders.sort((a, b) => a.value - b.value);
    return defenders;
  }
  
  // Lấy giá trị thực của quân (bao gồm bonus vị trí và chốt đầu)
  function getPieceValue(piece, r, c, color) {
    const type = getType(piece);
    let value = VALUES[type];
    
    // Bonus đặc biệt cho chốt đầu
    if (type === PIECE_PAWN) {
      if (PAWN_VALUES_BY_COLUMN[c] !== undefined) {
        value = PAWN_VALUES_BY_COLUMN[c];
      }
      // Thêm bonus nếu chốt đã qua sông
      if ((color === BLACK && r >= 5) || (color === RED && r <= 4)) {
        value += 30;
      }
    }
    
    // Thêm bonus vị trí
    value += getPositionalBonus(type, r, c, color);
    
    return value;
  }
  
  // Tính toán giá trị trao đổi (SEE - Static Exchange Evaluation)
  function calculateExchangeValue(pieceValue, attackers, defenders) {
    if (attackers.length === 0) return 0;
    
    // Mô phỏng chuỗi ăn quân
    let gain = pieceValue;  // Giá trị quân bị ăn đầu tiên
    let currentAttackerIdx = 0;
    let currentDefenderIdx = 0;
    let isAttackerTurn = true;
    
    const attackerValues = attackers.map(a => a.value);
    const defenderValues = defenders.map(d => d.value);
    
    let lastCapturedValue = pieceValue;
    let totalGain = 0;
    
    while (true) {
      if (isAttackerTurn) {
        if (currentAttackerIdx >= attackerValues.length) break;
        totalGain += lastCapturedValue;
        lastCapturedValue = attackerValues[currentAttackerIdx];
        currentAttackerIdx++;
      } else {
        if (currentDefenderIdx >= defenderValues.length) break;
        totalGain -= lastCapturedValue;
        lastCapturedValue = defenderValues[currentDefenderIdx];
        currentDefenderIdx++;
      }
      isAttackerTurn = !isAttackerTurn;
    }
    
    return totalGain;
  }
  
  // Đánh giá xem có nên để bị ăn quân không (sacrifice evaluation)
  function evaluateSacrifice(threat) {
    // Nếu quân "treo" (không ai bảo vệ) -> không nên để bị ăn
    if (threat.isHanging) {
      return -threat.value;
    }
    
    // Tính toán nếu trao đổi xảy ra
    if (threat.attackers.length > 0 && threat.defenders.length > 0) {
      const attackerValue = threat.attackers[0].value;
      const defenderCanRecapture = threat.defenders[0].value;
      
      // Nếu quân tấn công có giá trị cao hơn quân bị ăn -> có thể đáng để trao đổi
      if (attackerValue > threat.value) {
        return attackerValue - threat.value; // Lợi nhuận từ trao đổi
      }
      
      // Nếu quân tấn công có giá trị bằng hoặc thấp hơn -> thua lỗ
      return threat.value - attackerValue;
    }
    
    return -threat.value;
  }

  // Get positional bonus from piece-square table
  function getPositionalBonus(type, r, c, color) {
    if (!PST[type]) return 0;
    // For RED, flip the row
    const row = (color === RED) ? (9 - r) : r;
    return PST[type][row][c] * 3; // Scale factor
  }

  // Detect if a move results in check
  function moveCausesCheck(fromR, fromC, toR, toC, targetColor) {
    const piece = board[fromR][fromC];
    const cap = board[toR][toC];
    board[toR][toC] = piece;
    board[fromR][fromC] = 0;
    const checking = inCheck(targetColor);
    board[fromR][fromC] = piece;
    board[toR][toC] = cap;
    return checking;
  }

  // Get a simplified board hash for repetition detection
  function getSimpleBoardHash() {
    let hash = '';
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        const p = board[r][c];
        if (p !== 0) {
          hash += `${r}${c}${p}|`;
        }
      }
    }
    return hash + turn;
  }

  // Count how many times current position has appeared
  function countPositionRepetitions() {
    const currentHash = getSimpleBoardHash();
    return positionHistory.filter(h => h === currentHash).length;
  }

  // Check if a move is a repeating check (perpetual check pattern)
  function isRepeatingCheck(move) {
    if (aiCheckHistory.length < 4) return false;
    
    // Check if this is a checking move
    if (!moveCausesCheck(move.fromR, move.fromC, move.toR, move.toC, RED)) {
      return false;
    }
    
    // Look for pattern: same piece returning to similar positions
    const last4Checks = aiCheckHistory.slice(-4);
    const pieceType = getType(board[move.fromR][move.fromC]);
    
    // Count similar checking patterns
    let similarPatterns = 0;
    for (const checkMove of last4Checks) {
      if (checkMove.pieceType === pieceType) {
        // Same piece type making checks
        const dist = Math.abs(checkMove.toR - move.toR) + Math.abs(checkMove.toC - move.toC);
        if (dist <= 2) similarPatterns++;
      }
    }
    
    return similarPatterns >= 2;
  }

  function evaluate() {
    let s = 0;
    let blackKing = null, redKing = null;
    let blackMobility = 0, redMobility = 0;
    let blackAttacks = 0, redAttacks = 0;
    
    // Track pieces for opening evaluation
    let blackHorses = [];
    let redHorses = [];
    let blackPawns = [];
    let redPawns = [];
    let blackCannons = [];
    let redCannons = [];

    // Find kings and track pieces first
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
      const p = board[r][c];
      if (p === 0) continue;
      const type = getType(p);
      const color = getColor(p);
      
      if (type === PIECE_KING) {
        if (color === BLACK) blackKing = {r,c}; else redKing = {r,c};
      } else if (type === PIECE_HORSE) {
        if (color === BLACK) blackHorses.push({r,c}); else redHorses.push({r,c});
      } else if (type === PIECE_PAWN) {
        if (color === BLACK) blackPawns.push({r,c}); else redPawns.push({r,c});
      } else if (type === PIECE_CANNON) {
        if (color === BLACK) blackCannons.push({r,c}); else redCannons.push({r,c});
      }
    }
    
    // === OPENING PHASE EVALUATION (first 10 moves) ===
    const isOpening = moveHistory.length < 20;
    
    if (isOpening) {
      // --- BẢO VỆ CHỐT ĐẦU (Chốt giữa e7 cho Đen, e4 cho Đỏ) ---
      
      // Kiểm tra chốt đầu Đen (e7 = row 3, col 4)
      const blackCenterPawn = blackPawns.find(p => p.r === 3 && p.c === 4);
      if (blackCenterPawn) {
        // Kiểm tra xem chốt có được Mã bảo vệ không
        let isProtected = false;
        for (const horse of blackHorses) {
          // Mã ở c8 (row 2, col 2) bảo vệ chốt e7
          // Mã ở g8 (row 2, col 6) bảo vệ chốt e7
          if ((horse.r === 2 && horse.c === 2) || (horse.r === 2 && horse.c === 6)) {
            // Kiểm tra Mã có thể nhảy đến bảo vệ chốt không
            const horseMoves = generateMoves(horse.r, horse.c, false);
            if (horseMoves.some(m => m.r === 3 && m.c === 4)) {
              isProtected = true;
              break;
            }
          }
          // Mã đã phát triển và có thể bảo vệ
          if (horse.r >= 2 && horse.r <= 4) {
            const dist = Math.abs(horse.r - 3) + Math.abs(horse.c - 4);
            if (dist <= 3) isProtected = true;
          }
        }
        
        if (isProtected) {
          s += OPENING_PRIORITIES.PROTECT_CENTER_PAWN;
        } else {
          // Kiểm tra nếu chốt đang bị đe dọa
          const threatenedByRedCannon = redCannons.some(cannon => {
            if (cannon.c === 4) { // Cùng cột với chốt
              // Kiểm tra có quân ở giữa để Pháo bắn không
              let piecesBetween = 0;
              const minR = Math.min(cannon.r, 3);
              const maxR = Math.max(cannon.r, 3);
              for (let checkR = minR + 1; checkR < maxR; checkR++) {
                if (board[checkR][4] !== 0) piecesBetween++;
              }
              return piecesBetween === 1; // Pháo có thể bắn
            }
            return false;
          });
          
          if (threatenedByRedCannon) {
            s += OPENING_PRIORITIES.UNPROTECTED_PAWN_PENALTY;
          }
        }
      } else {
        // Chốt đầu đã bị mất - penalty lớn trong khai cuộc
        s -= 60;
      }
      
      // --- PHÁT TRIỂN MÃ SỚM ---
      for (const horse of blackHorses) {
        // Mã đã rời vị trí ban đầu (row 0)
        if (horse.r > 0) {
          s += OPENING_PRIORITIES.DEVELOP_HORSE_EARLY;
          // Bonus thêm nếu Mã ở vị trí tốt (hàng 2-3)
          if (horse.r >= 2 && horse.r <= 3) {
            s += 20;
          }
        }
      }
      
      // Penalty nếu Mã chưa phát triển sau vài nước
      if (moveHistory.length > 6) {
        const undevelopedHorses = blackHorses.filter(h => h.r === 0).length;
        s -= undevelopedHorses * 30;
      }
      
      // --- SĨ TƯỢNG BẢO VỆ ---
      // Bonus nếu Sĩ đã lên (bảo vệ Tướng và chốt)
      for(let r=0;r<3;r++) for(let c=3;c<=5;c++) {
        const p = board[r][c];
        if (getType(p) === PIECE_ADVISOR && getColor(p) === BLACK) {
          if (r === 1) s += OPENING_PRIORITIES.CASTLE_ADVISORS;
        }
      }
      
      // === ĐÁNH GIÁ CHỐT ĐỎ (đối xứng) ===
      const redCenterPawn = redPawns.find(p => p.r === 6 && p.c === 4);
      if (redCenterPawn) {
        let isProtected = false;
        for (const horse of redHorses) {
          if (horse.r >= 5 && horse.r <= 7) {
            const dist = Math.abs(horse.r - 6) + Math.abs(horse.c - 4);
            if (dist <= 3) isProtected = true;
          }
        }
        if (!isProtected) {
          // Bonus cho Đen nếu chốt Đỏ không được bảo vệ
          const threatenedByBlackCannon = blackCannons.some(cannon => {
            if (cannon.c === 4) {
              let piecesBetween = 0;
              const minR = Math.min(cannon.r, 6);
              const maxR = Math.max(cannon.r, 6);
              for (let checkR = minR + 1; checkR < maxR; checkR++) {
                if (board[checkR][4] !== 0) piecesBetween++;
              }
              return piecesBetween === 1;
            }
            return false;
          });
          if (threatenedByBlackCannon) s += 50; // Cơ hội tấn công
        }
      }
    }

    // === ĐÁNH GIÁ TỪNG QUÂN ===
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
      const p = board[r][c];
      if(p===0) continue;
      const type = getType(p);
      const color = getColor(p);
      let val = VALUES[type];
      
      if (isHidden(p)) {
        val = 50; // Hidden pieces have uncertain value
      } else {
        // === TRỌNG SỐ ĐẶC BIỆT CHO CHỐT ===
        if (type === PIECE_PAWN) {
          // Sử dụng giá trị theo cột (chốt đầu cao hơn)
          val = PAWN_VALUES_BY_COLUMN[c] || VALUES[PIECE_PAWN];
          
          // Bonus nếu chốt đã qua sông
          if ((color === BLACK && r >= 5) || (color === RED && r <= 4)) {
            val += 40;
          }
          
          // Bonus thêm cho chốt đầu ở vị trí ban đầu (chưa bị mất)
          if (c === 4) {
            if ((color === BLACK && r === 3) || (color === RED && r === 6)) {
              val += CENTER_PAWN_BONUS; // Chốt đầu còn nguyên rất quan trọng
            }
          }
        }
        
        // Add positional bonus
        val += getPositionalBonus(type, r, c, color);
        
        // Mobility bonus - count number of legal moves
        const moves = generateMoves(r, c, false); // Don't check safety for speed
        const mobility = moves.length * 2;
        if (color === BLACK) blackMobility += mobility;
        else redMobility += mobility;
        
        // Attacking bonuses (more strategic)
        if (color === BLACK && redKing) {
          const dr = Math.abs(r - redKing.r);
          const dc = Math.abs(c - redKing.c);
          
          // Horse attacking palace area - but not overvalue simple captures
          if (type === PIECE_HORSE && r >= 6) {
            if (c >= 2 && c <= 6) val += 40; // Moderate bonus for attacking position
          }
          
          // Cannon with good alignment - but penalize early unsupported attacks
          if (type === PIECE_CANNON) {
            // Check if cannon has pieces to jump over for meaningful attack
            let hasMiddlePiece = false;
            if (c === redKing.c) {
              for (let tr = r + 1; tr < redKing.r; tr++) {
                if (board[tr][c] !== 0) { hasMiddlePiece = true; break; }
              }
              if (hasMiddlePiece) val += 60; // Only bonus if cannon can actually threaten
            }
          }
          
          // Rook in strong position
          if (type === PIECE_ROOK) {
            if (r >= 5) val += 30; // Rook advanced
            if (r === 9) val += 20; // Rook on back rank
          }
          
          // Bonus for pieces near enemy king but with support
          if (dr <= 3 && dc <= 2) val += 25;
        }
        
        // King safety - advisor and elephant protection
        if (color === BLACK && blackKing) {
          if (type === PIECE_ADVISOR || type === PIECE_ELEPHANT) {
            const dr = Math.abs(r - blackKing.r);
            const dc = Math.abs(c - blackKing.c);
            if (dr <= 2 && dc <= 2) val += 30; // Protecting king
          }
        }
        
        if (color === RED && redKing) {
          if (type === PIECE_ADVISOR || type === PIECE_ELEPHANT) {
            const dr = Math.abs(r - redKing.r);
            const dc = Math.abs(c - redKing.c);
            if (dr <= 2 && dc <= 2) val += 30;
          }
        }
        
        // Central control bonus
        if (c >= 3 && c <= 5) val += 5;
      }
      
      if(color===BLACK) s+=val; else s-=val;
    }
    
    // === ĐÁNH GIÁ MỐI ĐE DỌA ===
    // Phân tích các quân Đen bị đe dọa
    const blackThreats = findThreatenedPieces(BLACK);
    for (const threat of blackThreats) {
      // Penalty cho quân "treo" (không được bảo vệ)
      if (threat.isHanging) {
        // Penalty nặng hơn cho quân có giá trị cao
        s -= threat.value * 0.3;
        
        // Penalty đặc biệt nặng cho chốt đầu không được bảo vệ
        if (threat.type === PIECE_PAWN && threat.c === 4) {
          s -= 50;
        }
      } else if (threat.netLoss > 0) {
        // Nếu trao đổi không có lợi, penalty nhẹ hơn
        s -= threat.netLoss * 0.15;
      }
    }
    
    // Phân tích các quân Đỏ bị đe dọa (cơ hội cho Đen)
    const redThreats = findThreatenedPieces(RED);
    for (const threat of redThreats) {
      if (threat.isHanging) {
        // Bonus cho Đen vì Đỏ có quân yếu
        s += threat.value * 0.25;
        
        // Bonus đặc biệt nếu chốt đầu Đỏ không được bảo vệ
        if (threat.type === PIECE_PAWN && threat.c === 4) {
          s += 40;
        }
      } else if (threat.netLoss > 0) {
        s += threat.netLoss * 0.1;
      }
    }
    
    // Add mobility difference
    s += (blackMobility - redMobility) * 2;
    
    // Check status bonus
    if (inCheck(RED)) s += 50;
    if (inCheck(BLACK)) s -= 50;
    
    return s;
  }

  function sortMoves(moves) {
    return moves.sort((a, b) => {
      let scoreA = 0, scoreB = 0;
      
      // Capture value (MVV-LVA)
      if (board[a.toR][a.toC] !== 0) {
        scoreA = VALUES[getType(board[a.toR][a.toC])] * 10 - VALUES[getType(board[a.fromR][a.fromC])];
      }
      if (board[b.toR][b.toC] !== 0) {
        scoreB = VALUES[getType(board[b.toR][b.toC])] * 10 - VALUES[getType(board[b.fromR][b.fromC])];
      }
      
      return scoreB - scoreA;
    });
  }

  // Quiescence search - continue searching captures to avoid horizon effect
  function quiescence(alpha, beta, isMax, depth = 0) {
    const standPat = evaluate();
    
    if (depth >= 4) return standPat; // Limit quiescence depth
    
    if (isMax) {
      if (standPat >= beta) return beta;
      if (alpha < standPat) alpha = standPat;
    } else {
      if (standPat <= alpha) return alpha;
      if (beta > standPat) beta = standPat;
    }
    
    // Only look at captures
    let captures = [];
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        if(getColor(board[r][c]) === (isMax ? BLACK : RED)) {
          const moves = generateMoves(r, c, true);
          for (const m of moves) {
            if (board[m.r][m.c] !== 0) { // Is capture
              captures.push({fromR: r, fromC: c, toR: m.r, toC: m.c});
            }
          }
        }
      }
    }
    
    captures = sortMoves(captures);
    
    for (const m of captures) {
      const cap = board[m.toR][m.toC];
      const piece = board[m.fromR][m.fromC];
      board[m.toR][m.toC] = piece;
      board[m.fromR][m.fromC] = 0;
      
      const score = quiescence(alpha, beta, !isMax, depth + 1);
      
      board[m.fromR][m.fromC] = piece;
      board[m.toR][m.toC] = cap;
      
      if (isMax) {
        if (score >= beta) return beta;
        if (score > alpha) alpha = score;
      } else {
        if (score <= alpha) return alpha;
        if (score < beta) beta = score;
      }
    }
    
    return isMax ? alpha : beta;
  }

  function minimax(depth, isMax, alpha, beta) {
    // Use quiescence search at leaf nodes
    if (depth === 0) {
      return quiescence(alpha, beta, isMax);
    }

    let moves = [];
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        if(getColor(board[r][c]) === (isMax ? BLACK : RED)) {
          generateMoves(r, c, true).forEach(t => moves.push({fromR: r, fromC: c, toR: t.r, toC: t.c}));
        }
      }
    }

    if (moves.length === 0) {
      // Checkmate or stalemate
      const color = isMax ? BLACK : RED;
      if (inCheck(color)) {
        return isMax ? -20000 + (config.difficulty - depth) : 20000 - (config.difficulty - depth);
      }
      return 0; // Stalemate
    }

    moves = sortMoves(moves);

    if (isMax) {
      let max = -Infinity;
      for (let m of moves) {
        const cap = board[m.toR][m.toC];
        const piece = board[m.fromR][m.fromC];
        board[m.toR][m.toC] = piece;
        board[m.fromR][m.fromC] = 0;
        
        let v = minimax(depth - 1, false, alpha, beta);
        
        board[m.fromR][m.fromC] = piece;
        board[m.toR][m.toC] = cap;
        
        max = Math.max(max, v);
        alpha = Math.max(alpha, v);
        if (beta <= alpha) break;
      }
      return max;
    } else {
      let min = Infinity;
      for (let m of moves) {
        const cap = board[m.toR][m.toC];
        const piece = board[m.fromR][m.fromC];
        board[m.toR][m.toC] = piece;
        board[m.fromR][m.fromC] = 0;
        
        let v = minimax(depth - 1, true, alpha, beta);
        
        board[m.fromR][m.fromC] = piece;
        board[m.toR][m.toC] = cap;
        
        min = Math.min(min, v);
        beta = Math.min(beta, v);
        if (beta <= alpha) break;
      }
      return min;
    }
  }

  function getBestMove() {
    const fen = generateFEN();
    
    // Use opening book for first several moves
    if (moveHistory.length < 12 && OPENING_BOOK[fen]) {
      const bookMove = OPENING_BOOK[fen];
      showStrategyToast();
      return bookMove;
    }
    
    // === CHIẾN THUẬT KHAI CUỘC ĐẶC BIỆT ===
    const isEarlyOpening = moveHistory.length < 8;
    
    if (isEarlyOpening) {
      // Ưu tiên phát triển Mã để bảo vệ chốt đầu
      const openingMove = getOpeningDevelopmentMove();
      if (openingMove) {
        showStrategyToast();
        return openingMove;
      }
    }
    
    // === PHÂN TÍCH Ý ĐỒ CỦA ĐỐI PHƯƠNG ===
    const opponentIntention = analyzeOpponentIntention();
    
    // Nếu có quân quan trọng đang bị đe dọa, ưu tiên bảo vệ
    const urgentDefense = getUrgentDefensiveMove(opponentIntention);
    if (urgentDefense) {
      return urgentDefense;
    }

    let moves=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      if(getColor(board[r][c])===BLACK)
        generateMoves(r,c,true).forEach(t=>moves.push({fromR:r,fromC:c,toR:t.r,toC:t.c}));

    if (moves.length === 0) return null;

    // Sort moves for better alpha-beta pruning
    moves = sortMovesAdvanced(moves, BLACK);

    // Use configured depth
    const searchDepth = config.difficulty || 4;
    
    let best = null;
    let max = -Infinity;
    let candidateMoves = []; // Keep track of good moves for variety

    for(let m of moves) {
      const cap = board[m.toR][m.toC];
      const piece = board[m.fromR][m.fromC];
      
      board[m.toR][m.toC] = piece;
      board[m.fromR][m.fromC] = 0;
      
      let v = minimax(searchDepth - 1, false, -Infinity, Infinity);
      
      // --- ANTI-REPETITION LOGIC ---
      // Penalize moves that lead to repeated positions
      const testHash = getSimpleBoardHash();
      const repetitions = positionHistory.filter(h => h === testHash).length;
      if (repetitions > 0) {
        v -= REPETITION_PENALTY * repetitions;
      }
      
      // --- ANTI-PERPETUAL CHECK LOGIC ---
      const causesCheck = inCheck(RED);
      if (causesCheck) {
        // Check if this is a repeating check pattern
        const pieceType = getType(piece);
        if (isRepeatingCheckPattern(pieceType, m.toR, m.toC)) {
          v -= PERPETUAL_CHECK_PENALTY;
        }
      }
      
      // Restore board
      board[m.fromR][m.fromC] = piece;
      board[m.toR][m.toC] = cap;
      
      // Track good moves
      if (v > max - 50) { // Within 50 points of best
        candidateMoves.push({ move: m, score: v });
      }
      
      if (v > max) {
        max = v;
        best = m;
      }
    }
    
    // If best move is a repeating pattern, try to find alternative
    if (best && candidateMoves.length > 1) {
      const bestCausesCheck = moveCausesCheck(best.fromR, best.fromC, best.toR, best.toC, RED);
      if (bestCausesCheck && isRepeatingCheck(best)) {
        // Find best non-repeating move
        candidateMoves.sort((a, b) => b.score - a.score);
        for (const candidate of candidateMoves) {
          if (!isRepeatingCheck(candidate.move)) {
            best = candidate.move;
            break;
          }
        }
      }
    }
    
    // Update check history if this move causes check
    if (best) {
      const piece = board[best.fromR][best.fromC];
      if (moveCausesCheck(best.fromR, best.fromC, best.toR, best.toC, RED)) {
        aiCheckHistory.push({
          fromR: best.fromR, fromC: best.fromC,
          toR: best.toR, toC: best.toC,
          pieceType: getType(piece)
        });
        // Keep only last 8 checks
        if (aiCheckHistory.length > 8) aiCheckHistory.shift();
      } else {
        // Non-checking move breaks the check pattern
        aiCheckHistory = [];
      }
    }
    
    return best;
  }
  
  // Check if this is part of a repeating check pattern
  function isRepeatingCheckPattern(pieceType, toR, toC) {
    if (aiCheckHistory.length < 3) return false;
    
    let matchCount = 0;
    for (const check of aiCheckHistory) {
      if (check.pieceType === pieceType) {
        const dist = Math.abs(check.toR - toR) + Math.abs(check.toC - toC);
        if (dist <= 2) matchCount++;
      }
    }
    return matchCount >= 2;
  }
  
  // === HÀM CHIẾN THUẬT KHAI CUỘC - BẢO VỆ CHỐT ĐẦU ===
  function getOpeningDevelopmentMove() {
    // Tìm vị trí các quân
    let leftHorse = null, rightHorse = null;
    let leftCannon = null, rightCannon = null;
    let centerPawn = null;
    let leftAdvisor = null, rightAdvisor = null;
    
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        const p = board[r][c];
        if (p === 0 || getColor(p) !== BLACK) continue;
        const type = getType(p);
        
        if (type === PIECE_HORSE) {
          if (c <= 4) leftHorse = {r, c};
          else rightHorse = {r, c};
        } else if (type === PIECE_CANNON) {
          if (c <= 4) leftCannon = {r, c};
          else rightCannon = {r, c};
        } else if (type === PIECE_PAWN && c === 4 && r === 3) {
          centerPawn = {r, c};
        } else if (type === PIECE_ADVISOR) {
          if (c < 4) leftAdvisor = {r, c};
          else rightAdvisor = {r, c};
        }
      }
    }
    
    // Kiểm tra xem chốt giữa có đang bị đe dọa không
    const centerPawnThreatened = isCenterPawnThreatened();
    
    // === ƯU TIÊN 1: PHÁT TRIỂN MÃ ĐỂ BẢO VỆ CHỐT ===
    
    // Nếu Mã trái vẫn ở vị trí ban đầu (b10), phát triển ra c8
    if (leftHorse && leftHorse.r === 0 && leftHorse.c === 1) {
      const moves = generateMoves(0, 1, true);
      // Nước đi ưu tiên: Mã b10 -> c8 (bảo vệ chốt e7)
      const developMove = moves.find(m => m.r === 2 && m.c === 2);
      if (developMove) {
        return {fromR: 0, fromC: 1, toR: 2, toC: 2};
      }
      // Nước đi thay thế: Mã b10 -> a8
      const altMove = moves.find(m => m.r === 2 && m.c === 0);
      if (altMove) {
        return {fromR: 0, fromC: 1, toR: 2, toC: 0};
      }
    }
    
    // Nếu Mã phải vẫn ở vị trí ban đầu (h10), phát triển ra g8
    if (rightHorse && rightHorse.r === 0 && rightHorse.c === 7) {
      const moves = generateMoves(0, 7, true);
      // Nước đi ưu tiên: Mã h10 -> g8 (bảo vệ chốt e7)
      const developMove = moves.find(m => m.r === 2 && m.c === 6);
      if (developMove) {
        return {fromR: 0, fromC: 7, toR: 2, toC: 6};
      }
      // Nước đi thay thế: Mã h10 -> i8
      const altMove = moves.find(m => m.r === 2 && m.c === 8);
      if (altMove) {
        return {fromR: 0, fromC: 7, toR: 2, toC: 8};
      }
    }
    
    // === ƯU TIÊN 2: NẾU CHỐT BỊ ĐE DỌA, TÌM NƯỚC BẢO VỆ ===
    if (centerPawnThreatened && centerPawn) {
      // Tìm quân có thể bảo vệ chốt
      for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
          const p = board[r][c];
          if (p === 0 || getColor(p) !== BLACK) continue;
          const type = getType(p);
          
          // Ưu tiên dùng Mã hoặc Pháo để bảo vệ
          if (type === PIECE_HORSE || type === PIECE_CANNON) {
            const moves = generateMoves(r, c, true);
            for (const m of moves) {
              // Kiểm tra nước đi này có chặn được mối đe dọa không
              board[m.r][m.c] = p;
              board[r][c] = 0;
              const stillThreatened = isCenterPawnThreatened();
              board[r][c] = p;
              board[m.r][m.c] = 0;
              
              if (!stillThreatened) {
                return {fromR: r, fromC: c, toR: m.r, toC: m.c};
              }
            }
          }
        }
      }
    }
    
    // === ƯU TIÊN 3: PHÁO RA VỊ TRÍ TỐT ===
    // Nếu cả 2 Mã đã phát triển, xem xét di chuyển Pháo
    const leftHorseDeveloped = leftHorse && leftHorse.r > 0;
    const rightHorseDeveloped = rightHorse && rightHorse.r > 0;
    
    if (leftHorseDeveloped && rightHorseDeveloped) {
      // Pháo ra cột giữa nếu có cơ hội
      if (leftCannon && leftCannon.r === 2 && leftCannon.c === 1) {
        const moves = generateMoves(2, 1, true);
        // Pháo ra cột e (giữa) để tạo áp lực
        const centerMove = moves.find(m => m.r === 2 && m.c === 4);
        if (centerMove) {
          return {fromR: 2, fromC: 1, toR: 2, toC: 4};
        }
      }
    }
    
    // === ƯU TIÊN 4: SĨ LÊN BẢO VỆ ===
    if (leftHorseDeveloped && rightHorseDeveloped) {
      // Sĩ trái lên e9
      if (leftAdvisor && leftAdvisor.r === 0 && leftAdvisor.c === 3) {
        const moves = generateMoves(0, 3, true);
        const advanceMove = moves.find(m => m.r === 1 && m.c === 4);
        if (advanceMove) {
          return {fromR: 0, fromC: 3, toR: 1, toC: 4};
        }
      }
    }
    
    return null; // Không có nước khai cuộc đặc biệt, dùng minimax
  }
  
  // Kiểm tra chốt giữa Đen (e7) có bị đe dọa không
  function isCenterPawnThreatened() {
    const centerPawnR = 3, centerPawnC = 4;
    const centerPawn = board[centerPawnR][centerPawnC];
    
    if (centerPawn === 0 || getColor(centerPawn) !== BLACK || getType(centerPawn) !== PIECE_PAWN) {
      return false; // Chốt không còn ở đó
    }
    
    // Kiểm tra các quân Đỏ có thể ăn chốt không
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        const p = board[r][c];
        if (p === 0 || getColor(p) !== RED) continue;
        
        const moves = generateMoves(r, c, false);
        if (moves.some(m => m.r === centerPawnR && m.c === centerPawnC)) {
          // Kiểm tra xem chốt có được bảo vệ không
          const isDefended = isPieceDefended(centerPawnR, centerPawnC, BLACK);
          if (!isDefended) return true;
          
          // Nếu quân tấn công có giá trị thấp hơn, vẫn coi là đe dọa
          const attackerValue = VALUES[getType(p)];
          const pawnValue = VALUES[PIECE_PAWN];
          if (attackerValue <= pawnValue) return true;
        }
      }
    }
    
    return false;
  }
  
  // Kiểm tra một quân có được bảo vệ không
  function isPieceDefended(r, c, defenderColor) {
    for(let dr=0; dr<ROWS; dr++) {
      for(let dc=0; dc<COLS; dc++) {
        if (dr === r && dc === c) continue;
        const p = board[dr][dc];
        if (p === 0 || getColor(p) !== defenderColor) continue;
        
        const moves = generateMoves(dr, dc, false);
        if (moves.some(m => m.r === r && m.c === c)) {
          return true;
        }
      }
    }
    return false;
  }
  
  // === PHÂN TÍCH Ý ĐỒ CỦA ĐỐI PHƯƠNG ===
  function analyzeOpponentIntention() {
    const result = {
      threatenedPieces: [],      // Quân Đen đang bị đe dọa
      possibleCaptures: [],       // Quân Đen có thể bị ăn ngay
      attackingPieces: [],        // Quân Đỏ đang tấn công
      mostDangerousThreat: null,  // Mối đe dọa nguy hiểm nhất
      opponentLastMoveIntent: null // Ý đồ của nước đi cuối
    };
    
    // Phân tích nước đi cuối của Đỏ (nếu có)
    if (lastMove && moveHistory.length > 0) {
      const lastMoveData = moveHistory[moveHistory.length - 1];
      if (lastMoveData && getColor(lastMoveData.piece) === RED) {
        // Xem quân Đỏ vừa di chuyển đang nhắm vào đâu
        const movedPieceR = lastMove.toR;
        const movedPieceC = lastMove.toC;
        const movedPiece = board[movedPieceR][movedPieceC];
        
        if (movedPiece && getColor(movedPiece) === RED) {
          const newThreats = generateMoves(movedPieceR, movedPieceC, false);
          
          // Tìm các quân Đen bị quân vừa di chuyển đe dọa
          for (const threat of newThreats) {
            const targetPiece = board[threat.r][threat.c];
            if (targetPiece && getColor(targetPiece) === BLACK) {
              const targetValue = getPieceValue(targetPiece, threat.r, threat.c, BLACK);
              result.opponentLastMoveIntent = {
                attacker: { r: movedPieceR, c: movedPieceC, piece: movedPiece },
                target: { r: threat.r, c: threat.c, piece: targetPiece, value: targetValue },
                type: getType(targetPiece)
              };
              
              // Nếu nhắm vào quân có giá trị cao, đánh dấu là quan trọng
              if (targetValue >= VALUES[PIECE_HORSE]) {
                result.attackingPieces.push({
                  r: movedPieceR, c: movedPieceC,
                  targeting: threat,
                  targetValue: targetValue
                });
              }
            }
          }
        }
      }
    }
    
    // Tìm tất cả quân Đen đang bị đe dọa
    result.threatenedPieces = findThreatenedPieces(BLACK);
    
    // Sắp xếp theo giá trị giảm dần (quân quan trọng nhất trước)
    result.threatenedPieces.sort((a, b) => b.value - a.value);
    
    // Xác định mối đe dọa nguy hiểm nhất
    if (result.threatenedPieces.length > 0) {
      const mostValuable = result.threatenedPieces[0];
      
      // Đặc biệt nguy hiểm nếu:
      // 1. Quân có giá trị cao
      // 2. Quân "treo" không được bảo vệ
      // 3. Chốt đầu bị đe dọa
      if (mostValuable.isHanging || 
          mostValuable.value >= VALUES[PIECE_CANNON] ||
          (mostValuable.type === PIECE_PAWN && mostValuable.c === 4)) {
        result.mostDangerousThreat = mostValuable;
      }
    }
    
    return result;
  }
  
  // Tìm nước đi phòng thủ khẩn cấp
  function getUrgentDefensiveMove(opponentIntention) {
    const { mostDangerousThreat, threatenedPieces } = opponentIntention;
    
    // Không có mối đe dọa nghiêm trọng
    if (!mostDangerousThreat) return null;
    
    // Kiểm tra xem có nên bảo vệ không
    const threat = mostDangerousThreat;
    
    // Nếu quân bị đe dọa có giá trị thấp và đổi được quân cao hơn -> không cần bảo vệ
    if (!threat.isHanging && threat.attackers.length > 0) {
      const attackerValue = threat.attackers[0].value;
      if (attackerValue > threat.value * 1.5) {
        // Trao đổi có lợi cho ta, không cần phòng thủ
        return null;
      }
    }
    
    // === TÌM NƯỚC PHÒNG THỦ TỐT NHẤT ===
    let bestDefense = null;
    let bestDefenseScore = -Infinity;
    
    const threatR = threat.r;
    const threatC = threat.c;
    const threatValue = threat.value;
    
    // Duyệt tất cả quân Đen để tìm nước phòng thủ
    for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        const p = board[r][c];
        if (p === 0 || getColor(p) !== BLACK) continue;
        
        const moves = generateMoves(r, c, true);
        
        for (const m of moves) {
          let defenseScore = 0;
          
          // === OPTION 1: Di chuyển quân bị đe dọa đi chỗ khác ===
          if (r === threatR && c === threatC) {
            // Kiểm tra vị trí mới có an toàn không
            board[m.r][m.c] = p;
            board[r][c] = 0;
            
            const stillThreatened = findAttackers(m.r, m.c, RED).length > 0;
            const isDefendedAtNew = findDefenders(m.r, m.c, BLACK).length > 0;
            
            board[r][c] = p;
            board[m.r][m.c] = 0;
            
            if (!stillThreatened) {
              defenseScore = threatValue + 100; // Rất tốt nếu thoát hoàn toàn
            } else if (isDefendedAtNew) {
              defenseScore = threatValue + 30; // Tốt nếu được bảo vệ
            }
            
            // Bonus nếu ăn được quân khi chạy
            const captured = board[m.r][m.c];
            if (captured && getColor(captured) === RED) {
              defenseScore += VALUES[getType(captured)];
            }
          }
          
          // === OPTION 2: Dùng quân khác chặn hoặc bảo vệ ===
          else {
            // Check if this move blocks the attack
            board[m.r][m.c] = p;
            board[r][c] = 0;
            
            const attackersAfter = findAttackers(threatR, threatC, RED);
            const defendersAfter = findDefenders(threatR, threatC, BLACK);
            
            board[r][c] = p;
            board[m.r][m.c] = 0;
            
            // Nếu chặn được hoàn toàn
            if (attackersAfter.length === 0) {
              defenseScore = threatValue + 50;
            }
            // Nếu thêm quân bảo vệ
            else if (defendersAfter.length > threat.defenders.length) {
              // Kiểm tra trao đổi có lợi không
              if (defendersAfter.length >= attackersAfter.length) {
                const lowestAttacker = attackersAfter[0]?.value || 0;
                if (lowestAttacker >= threatValue * 0.8) {
                  defenseScore = threatValue * 0.5 + 30; // Đáng để bảo vệ
                }
              }
            }
            
            // Bonus nếu vừa bảo vệ vừa ăn quân
            const captured = board[m.r][m.c];
            if (captured && getColor(captured) === RED) {
              const captureValue = VALUES[getType(captured)];
              defenseScore += captureValue;
              
              // Super bonus nếu ăn được quân đang tấn công
              const attackerPositions = threat.attackers.map(a => `${a.r},${a.c}`);
              if (attackerPositions.includes(`${m.r},${m.c}`)) {
                defenseScore += captureValue * 0.5; // Bonus ăn quân tấn công
              }
            }
          }
          
          // === OPTION 3: Phản công - đe dọa quân có giá trị cao hơn ===
          board[m.r][m.c] = p;
          board[r][c] = 0;
          
          const counterThreats = generateMoves(m.r, m.c, false);
          for (const ct of counterThreats) {
            const counterTarget = board[ct.r][ct.c];
            if (counterTarget && getColor(counterTarget) === RED) {
              const counterValue = VALUES[getType(counterTarget)];
              // Nếu đe dọa được quân có giá trị cao hơn quân bị đe dọa
              if (counterValue > threatValue) {
                defenseScore += (counterValue - threatValue) * 0.3;
              }
              // Đặc biệt nếu đe dọa được Tướng (chiếu)
              if (getType(counterTarget) === PIECE_KING) {
                defenseScore += 200;
              }
            }
          }
          
          board[r][c] = p;
          board[m.r][m.c] = 0;
          
          // Cập nhật nước đi tốt nhất
          if (defenseScore > bestDefenseScore) {
            bestDefenseScore = defenseScore;
            bestDefense = { fromR: r, fromC: c, toR: m.r, toC: m.c };
          }
        }
      }
    }
    
    // Chỉ trả về nước phòng thủ nếu đủ tốt
    // (giá trị phòng thủ phải đáng so với giá trị quân bị đe dọa)
    if (bestDefense && bestDefenseScore >= threatValue * 0.5) {
      return bestDefense;
    }
    
    return null; // Để minimax quyết định
  }

  // Advanced move sorting for better pruning
  function sortMovesAdvanced(moves, color) {
    return moves.sort((a, b) => {
      let scoreA = 0, scoreB = 0;
      
      // Captures (MVV-LVA: Most Valuable Victim - Least Valuable Attacker)
      const victimA = board[a.toR][a.toC];
      const victimB = board[b.toR][b.toC];
      if (victimA !== 0) scoreA += VALUES[getType(victimA)] * 10 - VALUES[getType(board[a.fromR][a.fromC])];
      if (victimB !== 0) scoreB += VALUES[getType(victimB)] * 10 - VALUES[getType(board[b.fromR][b.fromC])];
      
      // Check moves
      if (moveCausesCheck(a.fromR, a.fromC, a.toR, a.toC, color === BLACK ? RED : BLACK)) {
        // Penalize repeated check patterns
        if (!isRepeatingCheckPattern(getType(board[a.fromR][a.fromC]), a.toR, a.toC)) {
          scoreA += 200;
        }
      }
      if (moveCausesCheck(b.fromR, b.fromC, b.toR, b.toC, color === BLACK ? RED : BLACK)) {
        if (!isRepeatingCheckPattern(getType(board[b.fromR][b.fromC]), b.toR, b.toC)) {
          scoreB += 200;
        }
      }
      
      // Central control
      if (a.toC >= 3 && a.toC <= 5) scoreA += 10;
      if (b.toC >= 3 && b.toC <= 5) scoreB += 10;
      
      return scoreB - scoreA;
    });
  }

  function showStrategyToast() {
    const t = document.getElementById('strategy-toast');
    t.classList.add('show');
    playSound('strategy');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function getBestMoveForCurrentTurn() {
    const fen = generateFEN();
    if (OPENING_BOOK[fen]) return OPENING_BOOK[fen];

    let moves=[];
    let isRed = (turn === RED);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      if(getColor(board[r][c])===turn)
        generateMoves(r,c,true).forEach(t=>moves.push({fromR:r,fromC:c,toR:t.r,toC:t.c}));

    moves = sortMoves(moves);
    const searchDepth = config.difficulty || 4;

    let best=null;
    if (isRed) {
      let min=Infinity;
      for(let m of moves) {
        const cap=board[m.toR][m.toC];
        board[m.toR][m.toC]=board[m.fromR][m.fromC]; board[m.fromR][m.fromC]=0;
        const v = minimax(searchDepth - 1, true, -Infinity, Infinity);
        if(v<min) { min=v; best=m; }
        board[m.fromR][m.fromC]=board[m.toR][m.toC]; board[m.toR][m.toC]=cap;
      }
    } else {
      let max=-Infinity;
      for(let m of moves) {
        const cap=board[m.toR][m.toC];
        board[m.toR][m.toC]=board[m.fromR][m.fromC]; board[m.fromR][m.fromC]=0;
        const v = minimax(searchDepth - 1, false, -Infinity, Infinity);
        if(v>max) { max=v; best=m; }
        board[m.fromR][m.fromC]=board[m.toR][m.toC]; board[m.toR][m.toC]=cap;
      }
    }
    return best;
  }

  function startMoveAnimation(m, callback) {
    animating = true;
    const piece = board[m.fromR][m.fromC];
    const cap = board[m.toR][m.toC];

    if (cap !== 0) {
      const capColor = getColor(cap);
      const displayType = isHidden(cap) ? getTrueType(cap) : getType(cap);
      if (capColor === RED) {
        capturedState.blackCaptures.push(displayType);
      } else {
        capturedState.redCaptures.push(displayType);
      }
      renderCaptured();
    }

    animState = {
      piece: piece, captured: cap,
      fromR: m.fromR, fromC: m.fromC, toR: m.toR, toC: m.toC,
      startTime: performance.now(), duration: 200,
      callback: callback
    };
    playSound(cap ? 'capture' : 'move');

    const notation = getMoveNotation({fromR: m.fromR, fromC: m.fromC, toR: m.toR, toC: m.toC, piece: piece});

    moveHistory.push({
      fromR: m.fromR, fromC: m.fromC, toR: m.toR, toC: m.toC,
      piece: piece, captured: cap, lastMoveState: lastMove,
      notation: notation,
      boardHash: getBoardHash(),
      capturedStateSnapshot: JSON.parse(JSON.stringify(capturedState))
    });

    board[m.toR][m.toC] = piece; board[m.fromR][m.fromC] = 0;
    lastMove = m;
    requestAnimationFrame(animLoop);
  }

  function animLoop(time) {
    if(!animating) return;
    const el = time - animState.startTime;
    const prog = Math.min(el / animState.duration, 1);
    animState.progress = prog * (2 - prog);
    draw();
    if(prog<1) requestAnimationFrame(animLoop);
    else {
      animating = false; const cb = animState.callback; animState = null; cb();
    }
  }

  function finalizeMove() {
    const { toR, toC } = lastMove;
    const p = board[toR][toC];
    if (isHidden(p)) {
      const trueType = getTrueType(p);
      const color = getColor(p);
      board[toR][toC] = color | trueType;
      playSound('reveal');
    }
    turn = (turn===RED)?BLACK:RED;
    selectedPiece = null; possibleMoves = [];

    // Track position for repetition detection
    const currentHash = getSimpleBoardHash();
    positionHistory.push(currentHash);
    if (positionHistory.length > MAX_POSITION_HISTORY) {
      positionHistory.shift();
    }
    
    // Check for threefold repetition (draw by perpetual)
    const repetitions = positionHistory.filter(h => h === currentHash).length;
    if (repetitions >= 3) {
      end("Hòa! (Lặp thế cờ 3 lần)");
      return;
    }

    const rKing = findKing(RED);
    const bKing = findKing(BLACK);
    if(!rKing) { end("Bạn Thua! (Đỏ bị chiếu bí)"); return; }
    if(!bKing) { end("Bạn Thắng! (Đen bị chiếu bí)"); return; }
    
    // Update check state and show alert if in check
    updateCheckState();
    
    // Check for no legal moves (stalemate or checkmate)
    let hasLegalMoves = false;
    outer: for(let r=0; r<ROWS; r++) {
      for(let c=0; c<COLS; c++) {
        if(getColor(board[r][c]) === turn) {
          if(generateMoves(r, c, true).length > 0) {
            hasLegalMoves = true;
            break outer;
          }
        }
      }
    }
    
    if (!hasLegalMoves) {
      if (inCheck(turn)) {
        if (turn === RED) end("Bạn Thua! (Chiếu bí)");
        else end("Bạn Thắng! (Chiếu bí)");
      } else {
        end("Hòa! (Hết nước đi)");
      }
      return;
    }

    updateStatus(turn===RED?"Lượt của bạn":"Máy đang tính sâu...");
    draw();

    if(turn===BLACK && !gameOver && gameMode !== 'puzzle') {
      setTimeout(() => {
        const best = getBestMove();
        if(best) startMoveAnimation(best, finalizeMove);
        else end("Bạn Thắng! (Máy hết nước đi)");
      }, 300);
    }
  }

  function findKing(color) {
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      if(getType(board[r][c])===PIECE_KING && getColor(board[r][c])===color) return true;
    return false;
  }

  function end(msg) {
    gameOver = true;
    updateStatus(msg);
    showResultModal(msg);
    playSound('strategy');
  }

  function handleClick(e) {
    if(gameOver || animating) return;
    if (gameMode !== 'puzzle' && turn!==RED) return;
    if (turn !== RED) return;

    const rect = canvas.getBoundingClientRect();
    const c = Math.round((e.clientX - rect.left - MARGIN)/CELL_SIZE);
    const r = Math.round((e.clientY - rect.top - MARGIN)/CELL_SIZE);
    if(r<0||r>=ROWS||c<0||c>=COLS) return;

    const p = board[r][c];
    const color = getColor(p);

    if(selectedPiece) {
      const m = possibleMoves.find(x=>x.r===r && x.c===c);
      if(m) {
        startMoveAnimation({fromR:selectedPiece.r, fromC:selectedPiece.c, toR:r, toC:c}, () => {
          finalizeMove();
          if (gameMode === 'puzzle' && !gameOver) {
            setTimeout(() => {
              const best = getBestMove();
              if(best) startMoveAnimation(best, finalizeMove);
              else end("Bạn Thắng!");
            }, 600);
          }
        });
        return;
      }
    }
    if(color === RED) {
      selectedPiece = {r,c};
      possibleMoves = generateMoves(r,c,true);
      draw();
    } else {
      selectedPiece = null; possibleMoves = []; draw();
    }
  }

  function undo() {
    if(animating || moveHistory.length<2 || gameOver) return;
    undoOne(); undoOne(); draw();
    updateStatus("Lượt của bạn (Đỏ)");
  }
  function undoOne() {
    const m = moveHistory.pop();
    if(!m) return;
    board[m.fromR][m.fromC] = m.piece;
    board[m.toR][m.toC] = m.captured;
    lastMove = m.lastMoveState;
    if (m.capturedStateSnapshot) {
      capturedState = m.capturedStateSnapshot;
      renderCaptured();
    }
    // Remove last position from history
    if (positionHistory.length > 0) {
      positionHistory.pop();
    }
    // Clear check history on undo to reset perpetual check detection
    if (aiCheckHistory.length > 0) {
      aiCheckHistory.pop();
    }
    turn = (turn===RED)?BLACK:RED;
  }

  function getHint() {
    if(turn!==RED) return;
    const fen = generateFEN();
    if (OPENING_BOOK[fen]) {
      hintMove = OPENING_BOOK[fen];
      showStrategyToast();
      draw();
      return;
    }

    let moves=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      if(getColor(board[r][c])===RED)
        generateMoves(r,c,true).forEach(t=>moves.push({fromR:r,fromC:c,toR:t.r,toC:t.c}));

    moves = sortMoves(moves);
    const searchDepth = config.difficulty || 4;
    let best=null, min=Infinity;

    for(let m of moves) {
      const cap=board[m.toR][m.toC];
      board[m.toR][m.toC]=board[m.fromR][m.fromC]; board[m.fromR][m.fromC]=0;
      const v = minimax(searchDepth - 1, true, -Infinity, Infinity);
      if(v<min) { min=v; best=m; }
      board[m.fromR][m.fromC]=board[m.toR][m.toC]; board[m.toR][m.toC]=cap;
    }
    hintMove = best;
    draw();
  }

  function getBoardHash() { return turn + JSON.stringify(board); }
  function updateStatus(msg) { document.getElementById('status-text').innerText = msg; }

  // --- DRAWING ---
  function resize() {
    const h = window.innerHeight; const w = window.innerWidth;
    const size = Math.min(w * 0.95, h - 180);
    canvas.width = size * 0.9; canvas.height = size;
    CELL_SIZE = canvas.width / (COLS+1);
    MARGIN = CELL_SIZE; PIECE_RADIUS = CELL_SIZE * 0.4;
    draw();
  }

  function draw() {
    const theme = activeTheme;
    const grd = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
    grd.addColorStop(0, theme.boardBase); grd.addColorStop(1, theme.boardDark);
    ctx.fillStyle = grd; ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = theme.line; ctx.lineWidth = 2;
    for(let i=0;i<ROWS;i++) {
      ctx.beginPath(); ctx.moveTo(MARGIN, MARGIN+i*CELL_SIZE); ctx.lineTo(canvas.width-MARGIN, MARGIN+i*CELL_SIZE); ctx.stroke();
    }
    for(let i=0;i<COLS;i++) {
      if(i===0||i===COLS-1) {
        ctx.beginPath(); ctx.moveTo(MARGIN+i*CELL_SIZE, MARGIN); ctx.lineTo(MARGIN+i*CELL_SIZE, canvas.height-MARGIN); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(MARGIN+i*CELL_SIZE, MARGIN); ctx.lineTo(MARGIN+i*CELL_SIZE, MARGIN+4*CELL_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(MARGIN+i*CELL_SIZE, MARGIN+5*CELL_SIZE); ctx.lineTo(MARGIN+i*CELL_SIZE, canvas.height-MARGIN); ctx.stroke();
      }
    }
    const drawX = (rStart) => {
      const y = MARGIN + rStart*CELL_SIZE;
      ctx.beginPath();
      ctx.moveTo(MARGIN+3*CELL_SIZE, y); ctx.lineTo(MARGIN+5*CELL_SIZE, y+2*CELL_SIZE);
      ctx.moveTo(MARGIN+5*CELL_SIZE, y); ctx.lineTo(MARGIN+3*CELL_SIZE, y+2*CELL_SIZE);
      ctx.stroke();
    };
    drawX(0); drawX(7);

    ctx.fillStyle = theme.line; ctx.globalAlpha=0.4;
    ctx.font = `italic bold ${CELL_SIZE*0.6}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText("SỞ HÀ   ⚔   HÁN GIỚI", canvas.width/2, MARGIN+4.5*CELL_SIZE);
    ctx.globalAlpha=1.0;

    if(lastMove) {
      highlightSq(lastMove.fromR, lastMove.fromC, 'rgba(52, 152, 219, 0.3)');
      highlightSq(lastMove.toR, lastMove.toC, 'rgba(52, 152, 219, 0.3)');
    }
    if(selectedPiece) highlightSq(selectedPiece.r, selectedPiece.c, theme.highlight);
    
    // Draw check highlight on the king that is in check
    if (currentCheckState.inCheck && currentCheckState.kingPos) {
      const { r, c } = currentCheckState.kingPos;
      drawCheckHighlight(r, c);
    }

    for(let m of possibleMoves) {
      ctx.fillStyle = theme.highlight;
      ctx.beginPath(); ctx.arc(MARGIN+m.c*CELL_SIZE, MARGIN+m.r*CELL_SIZE, PIECE_RADIUS*0.3, 0, 6.28); ctx.fill();
    }

    if(hintMove && turn===RED) {
      ctx.strokeStyle = 'gold'; ctx.lineWidth=4;
      const x1=MARGIN+hintMove.fromC*CELL_SIZE, y1=MARGIN+hintMove.fromR*CELL_SIZE;
      const x2=MARGIN+hintMove.toC*CELL_SIZE, y2=MARGIN+hintMove.toR*CELL_SIZE;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x2,y2, 5, 0, 6.28); ctx.fillStyle='gold'; ctx.fill();
    }

    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
      const p = board[r][c];
      if(animating && animState && animState.toR===r && animState.toC===c) continue;
      if(p!==0) drawPiece(r, c, p);
    }

    if(animating && animState) {
      const { fromR, fromC, toR, toC, progress, piece } = animState;
      const x1 = MARGIN + fromC*CELL_SIZE, y1 = MARGIN + fromR*CELL_SIZE;
      const x2 = MARGIN + toC*CELL_SIZE, y2 = MARGIN + toR*CELL_SIZE;
      const curX = x1 + (x2-x1)*progress;
      const curY = y1 + (y2-y1)*progress;
      drawPieceRaw(curX, curY, piece, true);
    }
  }

  function highlightSq(r, c, color) {
    const x = MARGIN+c*CELL_SIZE, y=MARGIN+r*CELL_SIZE;
    ctx.fillStyle = color;
    ctx.fillRect(x-CELL_SIZE/2+2, y-CELL_SIZE/2+2, CELL_SIZE-4, CELL_SIZE-4);
  }
  
  // Draw pulsing red highlight for king in check
  function drawCheckHighlight(r, c) {
    const x = MARGIN + c * CELL_SIZE;
    const y = MARGIN + r * CELL_SIZE;
    const time = Date.now() / 200;
    const pulse = 0.4 + 0.3 * Math.sin(time); // Pulsing opacity
    const pulseRadius = PIECE_RADIUS * (1.3 + 0.15 * Math.sin(time)); // Pulsing size
    
    // Outer glow
    const gradient = ctx.createRadialGradient(x, y, PIECE_RADIUS * 0.5, x, y, pulseRadius * 1.5);
    gradient.addColorStop(0, `rgba(231, 76, 60, ${pulse})`);
    gradient.addColorStop(0.5, `rgba(231, 76, 60, ${pulse * 0.5})`);
    gradient.addColorStop(1, 'rgba(231, 76, 60, 0)');
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x, y, pulseRadius * 1.5, 0, Math.PI * 2);
    ctx.fill();
    
    // Inner ring
    ctx.strokeStyle = `rgba(255, 100, 100, ${0.6 + 0.4 * Math.sin(time)})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x, y, pulseRadius, 0, Math.PI * 2);
    ctx.stroke();
    
    // Request animation frame for continuous animation
    if (currentCheckState.inCheck && !gameOver) {
      requestAnimationFrame(() => draw());
    }
  }

  function drawPiece(r, c, p) {
    const x = MARGIN + c * CELL_SIZE;
    const y = MARGIN + r * CELL_SIZE;
    drawPieceRaw(x, y, p);
  }

  function drawPieceRaw(x, y, p, lift=false) {
    const theme = activeTheme;
    const color = getColor(p);
    const type = getType(p);
    const hidden = isHidden(p);
    const r = lift ? PIECE_RADIUS*1.1 : PIECE_RADIUS;
    const offset = lift ? 5 : 2;

    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(x+offset, y+offset, r, 0, 6.28); ctx.fill();

    const grd = ctx.createRadialGradient(x-r/3,y-r/3, r/10, x,y,r);
    if (hidden) {
      grd.addColorStop(0, '#95a5a6'); grd.addColorStop(1, '#34495e');
    } else {
      if (activeTheme === THEMES.wood) {
        grd.addColorStop(0, '#f9e79f'); grd.addColorStop(1, '#d4ac0d');
      } else if (activeTheme === THEMES.jade) {
        grd.addColorStop(0, '#e8f8f5'); grd.addColorStop(1, '#a3e4d7');
      } else {
        grd.addColorStop(0, '#fff'); grd.addColorStop(1, '#bdc3c7');
      }
    }
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(x,y,r,0,6.28); ctx.fill();

    ctx.lineWidth = 3;
    ctx.strokeStyle = (hidden) ? '#2c3e50' : (color===RED?theme.red:theme.black);
    ctx.stroke();
    ctx.lineWidth = 1; ctx.strokeStyle= hidden ? '#7f8c8d' : theme.line;
    ctx.beginPath(); ctx.arc(x,y,r*0.85,0,6.28); ctx.stroke();

    if (hidden) {
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = `${r*1.5}px serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText("?", x, y+r*0.1);
    } else {
      ctx.fillStyle = (color===RED)?theme.red:theme.black;
      ctx.font = `bold ${r*1.1}px 'Noto Serif TC', serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const chars = color===RED
        ? ["","帥","仕","相","傌","俥","炮","兵"]
        : ["","將","士","象","馬","車","砲","卒"];
      ctx.fillText(chars[type], x, y+r*0.1);
    }

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(x,y,r*0.9, -0.5, 1.0); ctx.fill();
  }

  window.addEventListener('resize', resize);
  canvas.addEventListener('mousedown', handleClick);
  canvas.addEventListener('touchstart', (e)=>{e.preventDefault(); handleClick(e.touches[0])}, {passive:false});

</script>
</body>
